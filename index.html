<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PropMatch | Welcome</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">

    <div class="text-center max-w-2xl px-4 animate-fade-in-up">
        <div class="mb-8">
            <i class="fa-solid fa-building-user text-blue-600 text-6xl mb-4"></i>
            <h1 class="font-bold text-5xl tracking-tight text-gray-900 mb-2">Prop<span class="text-blue-600">Match</span></h1>
            <p class="text-gray-500 text-lg">Select your portal to continue</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <a href="./buyer/" class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100 hover:shadow-lg transition-all hover:-translate-y-1 group block">
                <div class="bg-blue-50 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 group-hover:bg-blue-600 transition-colors">
                    <i class="fa-solid fa-magnifying-glass text-blue-600 text-2xl group-hover:text-white transition-colors"></i>
                </div>
                <h2 class="text-2xl font-bold text-gray-900 mb-2">I am a Buyer</h2>
                <p class="text-gray-500 text-sm">Search properties, express interest, and contact developers securely.</p>
            </a>

            <a href="./seller/" class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100 hover:shadow-lg transition-all hover:-translate-y-1 group block">
                <div class="bg-green-50 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 group-hover:bg-green-600 transition-colors">
                    <i class="fa-solid fa-tags text-green-600 text-2xl group-hover:text-white transition-colors"></i>
                </div>
                <h2 class="text-2xl font-bold text-gray-900 mb-2">I am a Seller</h2>
                <p class="text-gray-500 text-sm">List projects, manage your portfolio, and respond to buyer queries.</p>
            </a>
        </div>
    </div>

</body>
</html>
